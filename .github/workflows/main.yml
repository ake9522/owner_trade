name: Auto Update Owner Trade Data

on:
  schedule:
    # รันเวลา 19:00 UTC ในวัน จันทร์, อังคาร, พุธ, พฤหัส, เสาร์
    # จะตรงกับเวลาไทย 02:00 น. ในวัน อังคาร, พุธ, พฤหัส, ศุกร์, อาทิตย์
    - cron: '0 19 * * 1,2,3,4,6'
  workflow_dispatch: 

jobs:
  scrape_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run Script
        run: python owner_trade.py

      - name: Auto-update Trade Data
        run: |
          # ตั้งค่าบอทให้มาตรฐาน
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # เลือกเก็บเฉพาะไฟล์ในโฟลเดอร์ข้อมูล
          git add data_owner_trade/*.csv
          
          # ถ้ามีไฟล์ใหม่ ให้ Commit และ Push ไปที่ main branch ตรงๆ
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "No changes detected, skipping update."
          fi
