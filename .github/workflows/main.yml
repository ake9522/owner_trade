name: Auto Update Owner Trade Data

on:
  schedule:
    # รันเวลา 19:00 UTC ในวัน จันทร์, อังคาร, พุธ, พฤหัส, เสาร์
    # จะตรงกับเวลาไทย 02:00 น. ในวัน อังคาร, พุธ, พฤหัส, ศุกร์, อาทิตย์
    - cron: '0 19 * * 1,2,3,4,6'
  workflow_dispatch: 

jobs:
  scrape_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run Script
        run: python owner_trade.py

      - name: Save Data to Main Branch
        run: |
          # 1. ตั้งค่าบอท
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. ดึงข้อมูลล่าสุดและสลับมาที่เส้นสีฟ้า (main) ให้ชัวร์
          git fetch origin main
          git checkout main
          
          # 3. เตรียมไฟล์ CSV
          git add data_owner_trade/*.csv
          
          # 4. ตรวจสอบและบันทึกข้อมูล (Commit & Push)
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update trade data: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes to update."
          fi