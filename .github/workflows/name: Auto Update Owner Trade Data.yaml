name: Auto Update Owner Trade Data

on:
  schedule:
    # รันทุกวันเวลา 08:30 น. (เวลาไทย)
    - cron: '30 1 * * *'
  workflow_dispatch: # เพิ่มบรรทัดนี้เพื่อให้กดปุ่ม Run เองได้จากหน้าเว็บ

jobs:
  scrape_data:
    runs-on: ubuntu-latest
    # ตั้งค่าให้บอทมีสิทธิ์เขียนไฟล์ลง GitHub
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run Script
        run: python owner_trade.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data_owner_trade/owner_trade.csv
          # ถ้าไม่มีอะไรเปลี่ยนไม่ต้อง Commit (กัน Error)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trade data: $(date)" && git push)